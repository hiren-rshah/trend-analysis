spring:
  application:
    name: trend-analysis
  datasource:
    url: jdbc:h2:mem:trenddb
#    url: jdbc:h2:file:/data/trenddb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings.trace: false
      settings.web-allow-others: false
  ai:
    retry:
      max-attempts: 1
      backoff:
        delay: 2000 # milliseconds
        max-delay: 10000 # milliseconds
        multiplier: 2.0 # exponential backoff multiplier
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2:1b
    model:
      chat: ollama # openai or ollama


logging:
#  pattern:
#    console: %green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
  level:
    org:
      springframework:
        ai: INFO
        web:
          client: INFO
